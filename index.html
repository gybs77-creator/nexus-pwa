<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />
  <meta name="theme-color" content="#fafafa" media="(prefers-color-scheme: light)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Nexus" />
  <title>Nexus</title>

  <link rel="manifest" href="/manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="/logo_nexus_SD.png" />
  <link rel="apple-touch-icon" href="/logo_nexus_SD.png" />
  <link rel="stylesheet" href="/styles.css" />

  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.0/marked.min.js"></script>
</head>
<body>

  <!-- ====== MODALE D'AUTHENTIFICATION (premier lancement) ====== -->
  <div id="auth-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <div class="logo-sm"></div>
        <h2>Configuration Nexus</h2>
      </div>
      <p class="modal-text">Configure ton backend pour démarrer.</p>
      <label class="field">
        <span>URL du backend</span>
        <input type="text" id="auth-url" placeholder="https://ha-backend-xxx.up.railway.app" autocomplete="off" />
      </label>
      <label class="field">
        <span>Clé API (X-API-Key)</span>
        <input type="password" id="auth-key" placeholder="ta clé secrète" autocomplete="off" />
      </label>
      <button class="btn-primary" id="auth-save">Connecter</button>
      <p id="auth-error" class="error-text"></p>
    </div>
  </div>

  <!-- ====== APP PRINCIPALE ====== -->
  <div class="app">

    <!-- ====== SIDEBAR (conversations) ====== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="btn-icon" id="btn-close-sidebar" aria-label="Fermer">
          <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
        <button class="btn-new" id="btn-new-chat">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
          <span>Nouvelle conversation</span>
        </button>
      </div>
      <div class="conversations-list" id="conversations-list"></div>
      <div class="sidebar-footer">
        <button class="btn-ghost" id="btn-settings">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          Paramètres
        </button>
      </div>
    </aside>

    <!-- ====== ZONE PRINCIPALE ====== -->
    <main class="main">

      <!-- HEADER -->
      <header class="header">
        <button class="btn-icon" id="btn-open-sidebar" aria-label="Menu">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <h1 class="header-title">Nexus</h1>
        <div class="header-actions">
          <button class="btn-icon" id="btn-theme" aria-label="Thème">
            <svg id="icon-theme-dark" viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          </button>
          <button class="btn-icon" id="btn-toggle-dashboard" aria-label="Dashboard">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          </button>
        </div>
      </header>

      <section class="dashboard" id="dashboard">
        <div class="dashboard-header">
          <span class="dashboard-title">Tableau de bord</span>
          <button class="btn-link" id="btn-open-detail">Vue complète →</button>
        </div>
        <div class="dashboard-grid" id="dashboard-grid">
          <div class="card-skeleton">Chargement…</div>
        </div>
      </section>

      <section class="chat" id="chat">
        <div class="chat-welcome" id="chat-welcome">
          <div class="logo-lg"></div>
          <h2>Nexus</h2>
          <p>Assistant IA pour Home Assistant</p>
        </div>
      </section>

      <footer class="composer">
        <div id="composer-preview" class="composer-preview hidden"></div>
        <div class="composer-row">
          <button class="btn-icon btn-attach" id="btn-photo" aria-label="Photo">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="4"/></svg>
          </button>
          <input type="file" id="input-photo" accept="image/*" hidden />
          <textarea id="input-text" placeholder="Pose ta question à Nexus..." rows="1"></textarea>
          <button class="btn-icon btn-mic" id="btn-mic" aria-label="Dictée vocale">
            <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button class="btn-send" id="btn-send" aria-label="Envoyer" disabled>
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
          </button>
        </div>
        <div class="composer-status" id="composer-status"></div>
      </footer>

    </main>
  </div>

  <div id="detail-modal" class="modal-overlay hidden">
    <div class="modal modal-large">
      <div class="modal-header">
        <h2>Vue complète</h2>
        <button class="btn-icon" id="btn-close-detail" aria-label="Fermer">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <div id="detail-content" class="detail-content"></div>
    </div>
  </div>

  <div id="settings-modal" class="modal-overlay hidden">
    <div class="modal">
      <div class="modal-header">
        <h2>Paramètres</h2>
        <button class="btn-icon" id="btn-close-settings" aria-label="Fermer">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
        </button>
      </div>
      <label class="field">
        <span>URL backend</span>
        <input type="text" id="settings-url" />
      </label>
      <label class="field">
        <span>Clé API</span>
        <input type="password" id="settings-key" />
      </label>
      <button class="btn-primary" id="btn-save-settings">Enregistrer</button>
      <button class="btn-ghost-danger" id="btn-clear-history">Effacer tout l'historique</button>
      <p class="modal-footnote">Nexus PWA · v1.0</p>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
